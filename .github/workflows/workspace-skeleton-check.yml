# @/.github/workflows/workspace-skeleton-check.yml - 防止模板骨架文件被意外删除或遗漏
# - ../../README.md
# - ../../CLAUDE.md

name: Workspace Skeleton Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  workspace-skeleton:
    name: Workspace skeleton
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check workspace skeleton files
        shell: bash
        run: |
          required_files=(
            "README.md"
            "LICENSE"
            "CHANGELOG.md"
            "CLAUDE.md"
            "package.json"
            "package-lock.json"
            ".editorconfig"
            ".gitattributes"
            ".gitignore"
            "DOCUMENTS/TechStack.md"
            "DOCUMENTS/Commands.md"
            ".docs/wanto/README.md"
            ".docs/design/README.md"
            ".docs/plan/README.md"
            ".docs/history/README.md"
            ".docs/references/README.md"
            ".docs/trashcan/README.md"
            "web/package.json"
            "web/index.html"
            "web/tsconfig.json"
            "web/vite.config.ts"
            "web/eslint.config.js"
            "web/tailwind.config.js"
            "web/.prettierrc.cjs"
            "web/.prettierignore"
            "core/Cargo.toml"
            "core/Cargo.lock"
            "core/build.rs"
            "core/tauri.conf.json"
            "core/rustfmt.toml"
            "core/clippy.toml"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error file=$file::Required file is missing"
              missing=1
            fi
          done

          exit "$missing"
